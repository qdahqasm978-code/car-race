<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Race Game</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: none;
      background-color: #333;
      border: 2px solid white;
      width: 100vw;
      height: 100vh;
    }

    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    button {
      margin: 10px;
      padding: 14px 28px;
      font-size: 22px;
      background: linear-gradient(45deg, #ff0000, #cc0000);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, background 0.3s ease;
    }

    button:hover {
      background: linear-gradient(45deg, #cc0000, #990000);
      transform: scale(1.05);
    }

    #restartBtn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>
<body>
  <!-- شاشة البداية -->
  <div id="startScreen">
    <h1>🏎️ Car Race Game</h1>
    <p>اختر مستوى الصعوبة ثم اضغط تشغيل</p>
    <button id="easyBtn">😎 سهل</button>
    <button id="hardBtn">🔥 صعب</button>
    <br><br>
    <button id="startBtn">▶ Start</button>
  </div>

  <!-- الحلبة -->
  <canvas id="gameCanvas"></canvas>
  
  <!-- زر إعادة التشغيل -->
  <button id="restartBtn">🔄 Restart</button>
  
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const easyBtn = document.getElementById("easyBtn");
    const hardBtn = document.getElementById("hardBtn");

    let difficulty = "easy"; // الافتراضي

    easyBtn.addEventListener("click", () => {
      difficulty = "easy";
      alert("تم اختيار المستوى: سهل 😎");
    });

    hardBtn.addEventListener("click", () => {
      difficulty = "hard";
      alert("تم اختيار المستوى: صعب 🔥");
    });

    // ضبط حجم الكانفس ليملأ الشاشة
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // تحميل الصور
    const carImg = new Image();
    carImg.src = "car2.png";

    const roadImg = new Image();
    roadImg.src = "road.png";

    const car32Img = new Image();
    car32Img.src = "car32.png";

    const carExtraImg = new Image();
    carExtraImg.src = "carExtra.png";

    // مواقع السيارات والمتغيرات
    let carX, carY, car32X, car32Y, carExtraX, carExtraY;
    let gameOver, score, level;

    function resetGame() {
      carX = canvas.width / 2 - 40;
      carY = canvas.height - 160;
      car32X = Math.random() * (canvas.width - 80);
      car32Y = -160;
      carExtraX = Math.random() * (canvas.width - 80);
      carExtraY = -400;
      score = 0;
      level = 1;
      gameOver = false;
    }

    function drawGame() {
      if (gameOver) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(roadImg, 0, 0, canvas.width, canvas.height);
      ctx.drawImage(carImg, carX, carY, 80, 160);
      ctx.drawImage(car32Img, car32X, car32Y, 80, 160);
      ctx.drawImage(carExtraImg, carExtraX, carExtraY, 80, 160);

      // سرعة السيارات حسب الصعوبة
      let baseSpeed32 = (difficulty === "easy") ? 2 : 4;
      let baseSpeedExtra = (difficulty === "easy") ? 3 : 6;

      car32Y += baseSpeed32 + level;
      if (car32Y > canvas.height) {
        car32Y = -160;
        car32X = Math.random() * (canvas.width - 80);
        score++;
      }

      carExtraY += baseSpeedExtra + level;
      if (carExtraY > canvas.height) {
        carExtraY = -160;
        carExtraX = Math.random() * (canvas.width - 80);
        score++;
      }

      // حركة سيارتك للأمام
      carY -= 2;
      if (carY < 0) {
        carY = canvas.height - 160;
      }

      // زيادة المستوى كل 10 نقاط
      if (score > 0 && score % 10 === 0) {
        level = Math.floor(score / 10) + 1;
      }

      // عرض النقاط والمستوى والصعوبة
      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 40);
      ctx.fillText("Level: " + level, 20, 70);
      ctx.fillText("Difficulty: " + difficulty, 20, 100);

      // التصادم
      if (
        (carX < car32X + 30 && carX + 30 > car32X && carY < car32Y + 80 && carY + 80 > car32Y) ||
        (carX < carExtraX + 30 && carX + 30 > carExtraX && carY < carExtraY + 80 && carY + 80 > carExtraY)
      ) {
        endGame();
      }

      requestAnimationFrame(drawGame);
    }

    function endGame() {
      gameOver = true;
      alert("💥 Game Over! \nYour Score: " + score + "\nLevel: " + level + "\nDifficulty: " + difficulty);
      restartBtn.style.display = "block";
    }

    // التحكم بالسيارة بلوحة المفاتيح
    document.addEventListener("keydown", (e) => {
      let moveStep = (difficulty === "easy") ? 20 : 10;
      if (e.key === "ArrowLeft" && carX > 0) {
        carX -= moveStep;
      } else if (e.key === "ArrowRight" && carX < canvas.width - 80) {
        carX += moveStep;
      }
    });

    // التحكم بالهاتف عبر الجيروسكوب
    window.addEventListener("deviceorientation", (event) => {
      const tilt = event.gamma;
      let moveStep = (difficulty === "easy") ? 10 : 5;
      if (tilt < -5 && carX > 0) {
        carX -= moveStep;
      } else if (tilt > 5 && carX < canvas.width - 80) {
        carX += moveStep;
      }
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
      restartBtn.style.display = "none";
      bgMusic.play();
      drawGame();
    });

    startBtn.addEventListener("click", () => {
      startScreen.style.display = "none";
      canvas.style.display = "block";
      bgMusic.play();
      resetGame();
      drawGame();
    });

    // موسيقى خلفية
    const bgMusic = new Audio("background.mp3");
    bgMusic.loop = true;
  </script>
</body>
</html>
