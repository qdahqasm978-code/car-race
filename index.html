<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>🏎️ Car Race Game</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: none;
      background-color: #333;
      border: 2px solid white;
      width: 100vw;
      height: 100vh;
    }

    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    button {
      margin: 10px;
      padding: 14px 28px;
      font-size: 22px;
      background: linear-gradient(45deg, #ff0000, #cc0000);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, background 0.3s ease;
    }

    button:hover {
      background: linear-gradient(45deg, #cc0000, #990000);
      transform: scale(1.05);
    }

    #restartBtn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>

    <button id="hardBtn">🔥 صعب</button>
    <br><br>
    <button id="startBtn">▶ Start</button>
