<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>🏎️ Car Race Game</title>
  <style>
    body { background-color: black; margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: none; background-color: #333; border: 2px solid white; width: 100vw; height: 100vh; }
    #startScreen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; }
    button { margin: 10px; padding: 14px 28px; font-size: 22px; background: linear-gradient(45deg, #ff0000, #cc0000); color: white; border: none; cursor: pointer; border-radius: 10px; }
    #controlPanel { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    #controlPanel button { display: block; margin: 10px auto; }
  </style>
</head>
<body>
  <div id="startScreen">
    <h1>🏎️ Car Race Game</h1>
    <p>اختر مستوى الصعوبة ثم اضغط تشغيل</p>
    <button id="easyBtn">😎 سهل</button>
    <button id="hardBtn">🔥 صعب</button>
    <br><br>
    <button id="startBtn">▶ Start</button>
  </div>

  <canvas id="gameCanvas"></canvas>
  
  <div id="controlPanel">
    <button id="pauseBtn">⏸ Pause</button>
    <button id="restartBtn">🔄 Restart</button>
    <button id="car2Btn">🚗 Car 2</button>
    <button id="car32Btn">🚙 Car 32</button>
    <button id="carExtraBtn">🏎️ Car Extra</button>
  </div>
  
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const controlPanel = document.getElementById("controlPanel");
    const restartBtn = document.getElementById("restartBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const easyBtn = document.getElementById("easyBtn");
    const hardBtn = document.getElementById("hardBtn");

    const car2Btn = document.getElementById("car2Btn");
    const car32Btn = document.getElementById("car32Btn");
    const carExtraBtn = document.getElementById("carExtraBtn");

    let difficulty = "easy"; 
    let paused = false;
    let gameOver = false;
    let currentCar = "car2";

    easyBtn.onclick = () => { difficulty = "easy"; };
    hardBtn.onclick = () => { difficulty = "hard"; };

    car2Btn.onclick = () => { currentCar = "car2"; };
    car32Btn.onclick = () => { currentCar = "car32"; };
    carExtraBtn.onclick = () => { currentCar = "carExtra"; };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.onresize = resizeCanvas;
    resizeCanvas();

    const carImg = new Image(); carImg.src = "car2.png";
    const roadImg = new Image(); roadImg.src = "road.png";
    const car32Img = new Image(); car32Img.src = "car32.png";
    const carExtraImg = new Image(); carExtraImg.src = "carExtra.png";
    const car50Img = new Image(); car50Img.src = "car50.png";

    const bgMusic = new Audio("background.mp3");
    bgMusic.loop = true;
    const crashSound = new Audio("explosion.mp3");

    let carX, carY, car32X, car32Y, carExtraX, carExtraY;
    let score, level;

    function resetGame() {
      carX = canvas.width / 2 - 40;
      carY = canvas.height - 160;
      car32X = Math.random() * (canvas.width - 80);
      car32Y = -160;
      carExtraX = Math.random() * (canvas.width - 80);
      carExtraY = -400;
      window.car50X = Math.random() * (canvas.width - 80);
      window.car50Y = -600;
      score = 0;
      level = 1;
      gameOver = false;
      paused = false;
      controlPanel.style.display = "none";
    }

    function drawGame() {
      if (gameOver || paused) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (roadImg.complete) {
        ctx.drawImage(roadImg, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = "#444";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (currentCar === "car2") ctx.drawImage(carImg, carX, carY, 80, 160);
      else if (currentCar === "car32") ctx.drawImage(car32Img, carX, carY, 80, 160);
      else if (currentCar === "carExtra") ctx.drawImage(carExtraImg, carX, carY, 80, 160);

      ctx.drawImage(car32Img, car32X, car32Y, 80, 160);
      ctx.drawImage(carExtraImg, carExtraX, carExtraY, 80, 160);

      let baseSpeed32 = (difficulty === "easy") ? 2 : 4;
      let baseSpeedExtra = (difficulty === "easy") ? 3 : 6;

      if (difficulty === "hard") {
        if (car32X < carX) car32X += 1.5;
        else if (car32X > carX) car32X -= 1.5;
        if (carExtraX < carX) carExtraX += 2;
        else if (carExtraX > carX) carExtraX -= 2;
      }

      car32Y += baseSpeed32 + level;
      if (car32Y > canvas.height) {
        car32Y = -160;
        car32X = Math.random() * (canvas.width - 80);
        score++;
      }

      carExtraY += baseSpeedExtra + level;
      if (carExtraY > canvas.height) {
        carExtraY = -160;
        carExtraX = Math.random() * (canvas.width - 80);
        score++;
      }

      if (difficulty === "hard") {
        ctx.drawImage(car50Img, window.car50X, window.car50Y, 80, 160);
        window.car50Y += 6 + level;
        if (window.car50Y > canvas.height) {
          window.car50Y = -160;
          window.car50X = Math.random() * (canvas.width - 80);
          score++;
        }
        if (carX < window.car50X + 30 && carX + 30 > window.car50X && carY < window.car50Y + 60 && carY + 60 > window.car50Y) {
          endGame();
        }
      }

      carY -= 2;
      if (carY < 0) carY = canvas.height - 160;

      if (score > 0 && score % 10 === 0) {
        level = Math.floor(score / 10) + 1;
      }

      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 40);
      ctx.fillText("Level: " + level, 20, 70);
      ctx.fillText("Difficulty: " + difficulty, 20, 100);

      if (
        (carX < car32X + 30 && carX + 30 > car32X && carY < car32Y + 60 && carY + 60 > car32Y) ||
        (carX < carExtraX + 30 && carX + 30 > carExtraX && carY < carExtraY + 60 && carY + 60 > carExtraY)
      ) {
        endGame();
      }

      requestAnimationFrame(drawGame);
    }

    function endGame() {
      gameOver = true;
      bgMusic.pause();
      crashSound.play();
      alert("💥 Game Over!\nScore: " + score + "\nLevel: " + level + "\nDifficulty: " + difficulty);
      controlPanel.style.display = "block"; 
      pauseBtn.style.display = "none";
      restartBtn.style.display = "block";
    }

    document.onkeydown =    document.onkeydown = (e) => {
      let moveStep = (difficulty === "easy") ? 20 : 10;
      if (e.key === "ArrowLeft" && carX > 0) carX -= moveStep;
      else if (e.key === "ArrowRight" && carX < canvas.width - 80) carX += moveStep;
    };

    restartBtn.onclick = () => {
      resetGame();
      bgMusic.play();
      drawGame();
    };

    pauseBtn.onclick = () => {
      paused = !paused;
      if (!paused) {
        bgMusic.play();
        controlPanel.style.display = "none";
        drawGame();
      }
    };

    startBtn.onclick = () => {
      startScreen.style.display = "none";
      canvas.style.display = "block";
      resetGame();
      bgMusic.play();
      drawGame();
    };

    // عند الضغط على الشاشة تتوقف اللعبة ويظهر زر الإيقاف
    canvas.addEventListener("click", () => {
      if (!gameOver) {
        paused = true;
        bgMusic.pause();
        controlPanel.style.display = "block";
        pauseBtn.style.display = "block";
        restartBtn.style.display = "none";
      }
    });

    // تحكم بالهاتف عبر الجيروسكوب
    window.addEventListener("deviceorientation", (event) => {
      const tilt = event.gamma;
      let moveStep = (difficulty === "easy") ? 10 : 5;
      if (tilt < -5 && carX > 0) {
        carX -= moveStep;
      } else if (tilt > 5 && carX < canvas.width - 80) {
        carX += moveStep;
      }
    });
    // رسم السيارة المختارة
if (currentCar === "car2") {
  ctx.drawImage(carImg, carX, carY, 80, 160);
} else if (currentCar === "car32") {
  ctx.save();
  ctx.translate(carX + 40, carY + 80); // مركز السيارة
  ctx.rotate(Math.PI); // 180 درجة
  ctx.drawImage(car32Img, -40, -80, 80, 160);
  ctx.restore();
} else if (currentCar === "carExtra") {
  ctx.save();
  ctx.translate(carX + 40, carY + 80);
  ctx.rotate(Math.PI);
  ctx.drawImage(carExtraImg, -40, -80, 80, 160);
  ctx.restore();
});

  </script>
</body>
</html>
