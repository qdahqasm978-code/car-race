<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>🏎️ Car Race Game</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: none;
      background-color: #333;
      border: 2px solid white;
      width: 100vw;
      height: 100vh;
    }
    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }
    button {
      margin: 10px;
      padding: 14px 28px;
      font-size: 22px;
      background: linear-gradient(45deg, #ff0000, #cc0000);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
    }
    #restartBtn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>
<body>
  <!-- شاشة البداية -->
  <div id="startScreen">
    <h1>🏎️ Car Race Game</h1>
    <p>اختر مستوى الصعوبة ثم اضغط تشغيل</p>
    <button id="easyBtn">😎 سهل</button>
    <button id="hardBtn">🔥 صعب</button>
    <br><br>
    <button id="startBtn">▶ Start</button>
  </div>

  <!-- الحلبة -->
  <canvas id="gameCanvas"></canvas>
  
  <!-- زر إعادة التشغيل -->
  <button id="restartBtn">🔄 Restart</button>
