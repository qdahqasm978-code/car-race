<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لعبة السيارات</title>
  <style>
    body { background: #000; color: #fff; text-align: center; }
    canvas { background: #333; display: none; margin: auto; }
    #controlPanel { display: none; }
  </style>
</head>
<body>
  <div id="startScreen">
    <button id="startBtn">ابدأ اللعبة</button>
  </div>
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div id="controlPanel">
    <button id="pauseBtn">إيقاف مؤقت</button>
    <button id="restartBtn">إعادة</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");
    const controlPanel = document.getElementById("controlPanel");
    const startScreen = document.getElementById("startScreen");

    let carX = 160;
    let carY = 500;
    let paused = false;
    let gameOver = false;
    let difficulty = "easy";

    // صور السيارات
    const myCarImg = new Image();
    myCarImg.src = "myCar.png";

    const carExtraImg = new Image();
    carExtraImg.src = "carExtra.png";

    const car32Img = new Image();
    car32Img.src = "car32.png";

    const car50Img = new Image();
    car50Img.src = "car50.png";

    // موسيقى الخلفية
    const bgMusic = new Audio("bg.mp3");

    function resetGame() {
      carX = 160;
      carY = 500;
      gameOver = false;
      paused = false;
    }

    // دالة لرسم سيارتك
    function drawMyCar() {
      ctx.drawImage(myCarImg, carX, carY, 80, 160);
    }

    // دالة لرسم سيارات مقلوبة 180 درجة
    function drawEnemyCar(carImage, x, y, width, height) {
      ctx.save();
      ctx.translate(x + width / 2, y + height / 2);
      ctx.rotate(Math.PI);
      ctx.drawImage(carImage, -width / 2, -height / 2, width, height);
      ctx.restore();
    }

    function drawGame() {
      if (paused || gameOver) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // رسم سيارتي
      drawMyCar();

      // رسم السيارات المقلوبة
      drawEnemyCar(carExtraImg, 50, 100, 80, 160);
      drawEnemyCar(car32Img, 200, 200, 80, 160);
      drawEnemyCar(car50Img, 300, 50, 80, 160);

      requestAnimationFrame(drawGame);
    }

    document.onkeydown = (e) => {
      let moveStep = (difficulty === "easy") ? 20 : 10;
      if (e.key === "ArrowLeft" && carX > 0) carX -= moveStep;
      else if (e.key === "ArrowRight" && carX < canvas.width - 80) carX += moveStep;
    };

    restartBtn.onclick = () => {
      resetGame();
      bgMusic.play();
      drawGame();
    };

    pauseBtn.onclick = () => {
      paused = !paused;
      if (!paused) {
        bgMusic.play();
        controlPanel.style.display = "none";
        drawGame();
      }
    };

    startBtn.onclick = () => {
      startScreen.style.display = "none";
      canvas.style.display = "block";
      resetGame();
      bgMusic.play();
      drawGame();
    };

    // عند الضغط على الشاشة تتوقف اللعبة ويظهر زر الإيقاف
    canvas.addEventListener("click", () => {
      if (!gameOver) {
        paused = true;
        bgMusic.pause();
        controlPanel.style.display = "block";
        pauseBtn.style.display = "block";
        restartBtn.style.display = "none";
      }
    });

    // تحكم بالهاتف عبر الجيروسكوب
    window.addEventListener("deviceorientation", (event) => {
      const tilt = event.gamma;
      let moveStep = (difficulty === "easy") ? 10 : 5;
      if (tilt < -5 && carX > 0) {
        carX -= moveStep;
      } else if (tilt > 5 && carX < canvas.width - 80) {
        carX += moveStep;
      }
    });
  </script>
</body>
</html>
