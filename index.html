<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Race Game</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: none;
      background-color: #333;
      border: 2px solid white;
      width: 100vw;
      height: 100vh;
    }

    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    #startBtn, #restartBtn {
      margin-top: 10px;
      padding: 14px 28px;
      font-size: 22px;
      background: linear-gradient(45deg, #ff0000, #cc0000);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, background 0.3s ease;
    }

    #startBtn:hover, #restartBtn:hover {
      background: linear-gradient(45deg, #cc0000, #990000);
      transform: scale(1.05);
    }

    #restartBtn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
    }

    /* أزرار التحكم باللمس */
    #controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 40px;
    }

    .controlBtn {
      padding: 20px;
      font-size: 28px;
      background-color: rgba(255,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, background 0.3s ease;
    }

    .controlBtn:hover {
      background-color: rgba(255,0,0,0.8);
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <!-- شاشة البداية -->
  <div id="startScreen">
    <h1>🏎️ Car Race Game</h1>
    <p>اضغط على زر التشغيل للبدء</p>
    <button id="startBtn">▶ Start</button>
  </div>

  <!-- الحلبة -->
  <canvas id="gameCanvas"></canvas>
  
  <!-- زر إعادة التشغيل -->
  <button id="restartBtn">🔄 Restart</button>

  <!-- أزرار التحكم باللمس -->
  <div id="controls" style="display:none;">
    <button class="controlBtn" id="leftBtn">⬅️</button>
    <button class="controlBtn" id="rightBtn">➡️</button>
  </div>
  
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const controls = document.getElementById("controls");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    // ضبط حجم الكانفس ليملأ الشاشة
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // تحميل الصور
    const carImg = new Image();
    carImg.src = "car2.png";

    const roadImg = new Image();
    roadImg.src = "road.png";

    const car32Img = new Image();
    car32Img.src = "car32.png";

    const carExtraImg = new Image();
    carExtraImg.src = "carExtra.png";

    // مواقع السيارات والمتغيرات
    let carX, carY, car32X, car32Y, carExtraX, carExtraY;
    let gameOver, score, level;

    function resetGame() {
      carX = canvas.width / 2 - 25;
      carY = canvas.height - 120;
      car32X = Math.random() * (canvas.width - 50);
      car32Y = -100;
      carExtraX = Math.random() * (canvas.width - 50);
      carExtraY = -300;
      score = 0;
      level = 1;
      gameOver = false;
    }

    function drawGame() {
      if (gameOver) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(roadImg, 0, 0, canvas.width, canvas.height);
      ctx.drawImage(carImg, carX, carY, 60, 120); // حجم مناسب
      ctx.drawImage(car32Img, car32X, car32Y, 60, 120);
      ctx.drawImage(carExtraImg, carExtraX, carExtraY, 60, 120);

      // حركة السيارات المنافسة تعتمد على المستوى
      car32Y += 2 + level;
      if (car32Y > canvas.height) {
        car32Y = -120;
        car32X = Math.random() * (canvas.width - 60);
        score++;
      }

      carExtraY += 3 + level;
      if (carExtraY > canvas.height) {
        carExtraY = -120;
        carExtraX = Math.random() * (canvas.width - 60);
        score++;
      }

      // حركة سيارتك للأمام تلقائيًا
      carY -= 2;
      if (carY < 0) {
        carY = canvas.height - 120;
      }

      // زيادة المستوى كل 10 نقاط
      if (score > 0 && score % 10 === 0) {
        level = Math.floor(score / 10) + 1;
      }

      // عرض النقاط والمستوى
      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 40);
      ctx.fillText("Level: " + level, 20, 70);

      // التصادم (15 عرض × 50 طول)
      if (
        (carX < car32X + 15 && carX + 15 > car32X && carY < car32Y + 50 && carY + 50 > car32Y) ||
        (carX < carExtraX + 15 && carX + 15 > carExtraX && carY < carExtraY + 50 && carY + 50 > carExtraY)
      ) {
        endGame();
      }

      requestAnimationFrame(drawGame);
    }

    function endGame() {
      gameOver = true;
      alert("💥 Game Over! \nYour Score: " + score + "\nLevel: " + level);
      restartBtn.style.display = "block";
    }

    // التحكم بالسيارة بلوحة المفاتيح
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && carX > 0) {
        carX -= 20;
      } else if (e.key === "ArrowRight" && carX < canvas.width - 60) {
        carX += 20;
      }
    });

    // التحكم باللمس عبر الأزرار
    leftBtn.addEventListener("touchstart", () => {
      if (carX > 0) carX -= 20;
    });
    rightBtn.addEventListener("touchstart", () => {
      if (carX < canvas.width - 60) carX += 20;
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
      restartBtn.style.display = "none";
      bgMusic.play();
      drawGame();
    });

    startBtn.addEventListener("click", () => {
      startScreen.style.display = "none";
      canvas.style.display = "block";
      controls.style.display = "flex"; // إظهار أزرار التحكم
      bgMusic.play();
      resetGame();
      drawGame();
    });

    // موسيقى خلفية
    const bgMusic = new Audio("background.mp3");
    bgMusic.loop = true;
  </script>
</body>
</html>
