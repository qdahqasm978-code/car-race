<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Race Game</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      overflow: hidden; /* منع التمرير */
      font-family: Arial, sans-serif;
    }

    canvas {
      display: none;
      background-color: gray;
      border: 2px solid white;
      width: 100vw;   /* عرض كامل */
      height: 100vh;  /* ارتفاع كامل */
    }

    #startScreen {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    #startBtn, #restartBtn {
      margin-top: 10px;
      padding: 14px 28px;
      font-size: 22px;
      background-color: red;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    #startBtn:hover, #restartBtn:hover {
      background-color: darkred;
    }

    #restartBtn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>
<body>
  <!-- شاشة البداية -->
  <div id="startScreen">
    <h1>🏎️ Car Race Game</h1>
    <p>اضغط على زر التشغيل للبدء</p>
    <button id="startBtn">▶ Start</button>
  </div>

  <!-- الحلبة -->
  <canvas id="gameCanvas"></canvas>
  
  <!-- زر إعادة التشغيل -->
  <button id="restartBtn">🔄 Restart</button>
  
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");

    // ضبط حجم الكانفس ليملأ الشاشة (يدعم الهاتف والكمبيوتر)
    function resizeCanvas() {
      canvas.width = document.documentElement.clientWidth;
      canvas.height = document.documentElement.clientHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // تحميل الصور
    const carImg = new Image();
    carImg.src = "car2.png";

    const roadImg = new Image();
    roadImg.src = "road.png";

    const car32Img = new Image();
    car32Img.src = "car32.png";

    const carExtraImg = new Image();
    carExtraImg.src = "carExtra.png";

    // مواقع السيارات والمتغيرات
    let carX, carY, car32X, car32Y, carExtraX, carExtraY;
    let gameOver, score, level;

    function resetGame() {
      carX = canvas.width / 2 - 25;
      carY = canvas.height - 120;
      car32X = Math.random() * (canvas.width - 50);
      car32Y = -100;
      carExtraX = Math.random() * (canvas.width - 50);
      carExtraY = -300;
      score = 0;
      level = 1;
      gameOver = false;
    }

    function drawGame() {
      if (gameOver) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(roadImg, 0, 0, canvas.width, canvas.height);
      ctx.drawImage(carImg, carX, carY, 50, 100);
      ctx.drawImage(car32Img, car32X, car32Y, 50, 100);
      ctx.drawImage(carExtraImg, carExtraX, carExtraY, 50, 100);

      // حركة السيارات المنافسة تعتمد على المستوى
      car32Y += 2 + level;
      if (car32Y > canvas.height) {
        car32Y = -100;
        car32X = Math.random() * (canvas.width - 50);
        score++;
      }

      carExtraY += 3 + level;
      if (carExtraY > canvas.height) {
        carExtraY = -100;
        carExtraX = Math.random() * (canvas.width - 50);
        score++;
      }

      // حركة سيارتك للأمام تلقائيًا
      carY -= 2;
      if (carY < 0) {
        carY = canvas.height - 120;
      }

      // زيادة المستوى كل 10 نقاط
      if (score > 0 && score % 10 === 0) {
        level = Math.floor(score / 10) + 1;
      }

      // عرض النقاط والمستوى
      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.fillText("Score: " + score, 20, 40);
      ctx.fillText("Level: " + level, 20, 70);
